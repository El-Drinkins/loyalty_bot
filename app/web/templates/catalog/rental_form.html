{% extends "base.html" %}
{% block content %}
<h1>{% if rental %}✏️ Редактирование аренды{% else %}➕ Добавление аренды{% endif %}</h1>

<a href="/admin/catalog/rentals" class="button" style="margin-bottom: 20px;">◀️ Назад к списку</a>

<form method="post" style="background: white; padding: 20px; border-radius: 8px;">
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Номер аренды:</label>
        <input type="text" name="rental_number" value="{{ rental.rental_number if rental else rental_number }}" readonly style="width: 100%; padding: 8px; background: #f5f5f5;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Клиент:</label>
        <select name="user_id" id="user_id" required style="width: 100%; padding: 8px;">
            {% for user in users %}
            <option value="{{ user.id }}" {% if rental and rental.user_id == user.id %}selected{% endif %}>
                {{ user.full_name }} (ID: {{ user.id }})
            </option>
            {% endfor %}
        </select>
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Техника:</label>
        <input type="text" id="model_search" name="model_search" autocomplete="off"
               placeholder="Введите название техники..."
               value="{% if rental %}{{ rental.model.brand.name }} {{ rental.model.name }}{% endif %}"
               style="width: 100%; padding: 8px;">
        <input type="hidden" name="model_id" id="model_id" value="{% if rental %}{{ rental.model_id }}{% endif %}">
        <input type="hidden" id="model_price" value="{% if rental %}{{ rental.price_per_day }}{% endif %}">
        <input type="hidden" id="model_deposit" value="{% if rental %}{{ rental.deposit or 0 }}{% endif %}">
        <div id="model_suggestions" style="border: 1px solid #ddd; border-top: none; max-height: 300px; overflow-y: auto; display: none; background: white; position: absolute; z-index: 1000;"></div>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
        <div>
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Дата начала:</label>
            <input type="date" name="start_date" id="start_date" 
                   value="{% if rental %}{{ rental.start_date.strftime('%Y-%m-%d') }}{% endif %}" 
                   required style="width: 100%; padding: 8px;" onchange="updateTotalPrice()">
        </div>
        <div>
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Дата окончания:</label>
            <input type="date" name="end_date" id="end_date" 
                   value="{% if rental %}{{ rental.end_date.strftime('%Y-%m-%d') }}{% endif %}" 
                   required style="width: 100%; padding: 8px;" onchange="updateTotalPrice()">
        </div>
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Цена за день (₽):</label>
        <input type="number" name="price_per_day" id="price_per_day" 
               value="{{ rental.price_per_day if rental else '' }}" 
               required style="width: 100%; padding: 8px;" onchange="updateTotalPrice()">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Итоговая сумма (₽):</label>
        <input type="number" name="total_price" id="total_price" 
               value="{{ rental.total_price if rental else '' }}" 
               required style="width: 100%; padding: 8px; background-color: #fff9e6;">
        <small style="color: #666; display: block; margin-top: 5px;">
            💡 Рассчитано автоматически: <span id="calculated_total">0</span> ₽<br>
            Вы можете скорректировать сумму вручную (например, для скидки за длительную аренду)
        </small>
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Залог (₽):</label>
        <input type="number" name="deposit" id="deposit" 
               value="{{ rental.deposit if rental else '' }}" 
               style="width: 100%; padding: 8px;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Тип аренды:</label>
        <label style="display: flex; align-items: center; gap: 8px; padding: 8px; background: #f9f9f9; border-radius: 4px;">
            <input type="checkbox" name="is_monthly" value="true" {% if rental and rental.is_monthly %}checked{% endif %}>
            📅 Аренда на месяц (от 30 дней)
        </label>
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Статус:</label>
        <select name="status" style="width: 100%; padding: 8px;">
            <option value="active" {% if not rental or rental.status == 'active' %}selected{% endif %}>🟡 Активна</option>
            <option value="completed" {% if rental and rental.status == 'completed' %}selected{% endif %}>🟢 Завершена</option>
            <option value="cancelled" {% if rental and rental.status == 'cancelled' %}selected{% endif %}>🔴 Отменена</option>
        </select>
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Примечания:</label>
        <textarea name="notes" rows="3" style="width: 100%; padding: 8px;">{{ rental.notes if rental else '' }}</textarea>
    </div>
    
    <input type="hidden" name="admin_id" value="{{ admin_id }}">
    
    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button type="submit" class="button">{% if rental %}Сохранить изменения{% else %}Добавить аренду{% endif %}</button>
        <button type="button" class="button button-secondary" onclick="resetToCalculated()">🔄 Вернуть рассчитанную сумму</button>
        <a href="/admin/catalog/rentals" class="button button-red">Отмена</a>
    </div>
</form>

<script>
let searchTimeout;

document.getElementById('model_search').addEventListener('input', function() {
    clearTimeout(searchTimeout);
    const query = this.value.trim();
    const suggestionsDiv = document.getElementById('model_suggestions');
    
    if (query.length < 1) {
        suggestionsDiv.style.display = 'none';
        return;
    }
    
    searchTimeout = setTimeout(() => {
        fetch(`/admin/api/search_models?q=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(models => {
                suggestionsDiv.innerHTML = '';
                
                if (models.length === 0) {
                    suggestionsDiv.innerHTML = '<div style="padding: 10px; color: #999;">Ничего не найдено</div>';
                } else {
                    models.forEach(model => {
                        const div = document.createElement('div');
                        div.style.padding = '10px';
                        div.style.cursor = 'pointer';
                        div.style.borderBottom = '1px solid #eee';
                        div.innerHTML = `
                            <strong>${model.brand_name} ${model.name}</strong> - ${model.price_per_day} ₽/день
                            ${model.mount_type ? '<br><small style="color: #666;">Байонет: ' + model.mount_type + '</small>' : ''}
                        `;
                        div.onmouseover = function() { this.style.backgroundColor = '#e8f5e8'; };
                        div.onmouseout = function() { this.style.backgroundColor = ''; };
                        div.onclick = function() {
                            document.getElementById('model_search').value = `${model.brand_name} ${model.name}`;
                            document.getElementById('model_id').value = model.id;
                            document.getElementById('model_price').value = model.price_per_day;
                            document.getElementById('model_deposit').value = model.deposit || 0;
                            document.getElementById('price_per_day').value = model.price_per_day;
                            document.getElementById('deposit').value = model.deposit || 0;
                            suggestionsDiv.innerHTML = '';
                            suggestionsDiv.style.display = 'none';
                            updateTotalPrice();
                        };
                        suggestionsDiv.appendChild(div);
                    });
                }
                suggestionsDiv.style.display = 'block';
            });
    }, 300);
});

document.addEventListener('click', function(e) {
    if (!document.getElementById('model_search').contains(e.target)) {
        document.getElementById('model_suggestions').style.display = 'none';
    }
});

function updatePrice() {
    const price = document.getElementById('model_price').value;
    const deposit = document.getElementById('model_deposit').value;
    document.getElementById('price_per_day').value = price;
    document.getElementById('deposit').value = deposit;
    updateTotalPrice();
}

function calculateTotal() {
    const pricePerDay = parseInt(document.getElementById('price_per_day').value) || 0;
    const startDate = new Date(document.getElementById('start_date').value);
    const endDate = new Date(document.getElementById('end_date').value);
    
    if (startDate && endDate && startDate < endDate) {
        const days = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24));
        return pricePerDay * days;
    }
    return 0;
}

function updateTotalPrice() {
    const calculated = calculateTotal();
    document.getElementById('calculated_total').textContent = calculated;
    
    const totalInput = document.getElementById('total_price');
    const currentValue = parseInt(totalInput.value) || 0;
    const oldCalculated = parseInt(totalInput.getAttribute('data-calculated') || '0');
    
    if (currentValue === 0 || currentValue === oldCalculated) {
        totalInput.value = calculated;
        totalInput.setAttribute('data-calculated', calculated);
    }
}

function resetToCalculated() {
    const calculated = calculateTotal();
    document.getElementById('total_price').value = calculated;
    document.getElementById('total_price').setAttribute('data-calculated', calculated);
}

document.getElementById('price_per_day').addEventListener('change', updateTotalPrice);
document.getElementById('start_date').addEventListener('change', updateTotalPrice);
document.getElementById('end_date').addEventListener('change', updateTotalPrice);

document.addEventListener('DOMContentLoaded', function() {
    updateTotalPrice();
});
</script>

<style>
.button-secondary {
    background-color: #666;
}
.button-secondary:hover {
    background-color: #555;
}
#model_suggestions {
    width: calc(100% - 2px);
    position: absolute;
    z-index: 1000;
}
</style>
{% endblock %}
