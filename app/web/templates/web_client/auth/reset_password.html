{% extends "web_client/base.html" %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>🔐 Восстановление пароля</h1>
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <div id="step-phone" class="auth-step">
            <form id="reset-phone-form" class="auth-form">
                <div class="form-group">
                    <label for="phone">📱 Номер телефона</label>
                    <input type="tel" id="phone" name="phone" placeholder="+7 999 123-45-67" required>
                </div>
                <div id="reset-error" class="error-message" style="display: none;"></div>
                <button type="submit" class="btn btn-primary btn-block">Отправить код</button>
            </form>
        </div>
        
        <div id="step-code" class="auth-step" style="display: none;">
            <form id="reset-verify-form" class="auth-form">
                <input type="hidden" id="user_id" name="user_id">
                <div class="form-group">
                    <label for="code">🔢 Код из Telegram</label>
                    <input type="text" id="code" name="code" placeholder="123456" required>
                </div>
                <div class="form-group">
                    <label for="new_password">🔑 Новый пароль</label>
                    <input type="password" id="new_password" name="new_password" required>
                    <small>Минимум 6 символов</small>
                </div>
                <div class="form-group">
                    <label for="confirm_password">🔁 Подтвердите пароль</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
                <div id="verify-error" class="error-message" style="display: none;"></div>
                <button type="submit" class="btn btn-primary btn-block">Сменить пароль</button>
            </form>
        </div>
        
        <div class="auth-links">
            <a href="/client/login">← Назад ко входу</a>
        </div>
        
        <div class="auth-support">
            <p>❓ Не получаете код? <a href="https://t.me/el_drinkins" target="_blank">Обратитесь к администратору</a></p>
        </div>
    </div>
</div>

<script>
let userId = null;

document.getElementById('reset-phone-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const phone = document.getElementById('phone').value;
    const errorDiv = document.getElementById('reset-error');
    
    errorDiv.style.display = 'none';
    
    const response = await fetch('/client/reset-password/request-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ phone: phone })
    });
    
    const data = await response.json();
    
    if (data.error) {
        errorDiv.textContent = data.error;
        errorDiv.style.display = 'block';
    } else if (data.success) {
        userId = data.user_id;
        document.getElementById('user_id').value = userId;
        document.getElementById('step-phone').style.display = 'none';
        document.getElementById('step-code').style.display = 'block';
    }
});

document.getElementById('reset-verify-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const code = document.getElementById('code').value;
    const newPassword = document.getElementById('new_password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    const errorDiv = document.getElementById('verify-error');
    
    errorDiv.style.display = 'none';
    
    if (newPassword !== confirmPassword) {
        errorDiv.textContent = 'Пароли не совпадают';
        errorDiv.style.display = 'block';
        return;
    }
    
    if (newPassword.length < 6) {
        errorDiv.textContent = 'Пароль должен быть не менее 6 символов';
        errorDiv.style.display = 'block';
        return;
    }
    
    const response = await fetch('/client/reset-password/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
            user_id: userId,
            code: code,
            new_password: newPassword,
            confirm_password: confirmPassword
        })
    });
    
    const data = await response.json();
    
    if (data.error) {
        errorDiv.textContent = data.error;
        errorDiv.style.display = 'block';
    } else if (data.success) {
        window.location.href = '/client/login?reset=success';
    }
});
</script>
{% endblock %}
