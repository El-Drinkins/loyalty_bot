{% extends "base.html" %}

{% block content %}
<h1>🔐 Настройка двухфакторной аутентификации</h1>

<div style="max-width: 600px; margin: 0 auto;">
    <p>1. Установите приложение <b>Google Authenticator</b> на телефон</p>
    <p>2. Отсканируйте QR-код или введите секретный ключ вручную:</p>
    
    <div style="text-align: center; margin: 20px 0;">
        <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code" style="max-width: 250px;">
    </div>
    
    <p style="text-align: center; background: #f5f5f5; padding: 10px; border-radius: 4px; font-family: monospace;">
        {{ secret }}
    </p>
    
    <p>3. Введите 6-значный код из приложения для подтверждения:</p>
    
    <form action="/admin/verify-totp-setup" method="post" style="margin-top: 20px;">
        <input type="text" name="code" placeholder="000000" maxlength="6" required 
               style="width: 200px; padding: 10px; font-size: 20px; text-align: center; letter-spacing: 10px;">
        <button type="submit" class="button" style="margin-top: 10px;">Подтвердить</button>
    </form>
</div>
{% endblock %}
